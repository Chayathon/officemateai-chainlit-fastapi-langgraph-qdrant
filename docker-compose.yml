networks:
  officemate-network:
    driver: bridge

services:
  # ----------------------------------------
  # Service 1: vLLM
  # ----------------------------------------
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm-prod
    restart: always
    runtime: nvidia
    ipc: host
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
      - VLLM_API_KEY=${VLLM_API_KEY}
    volumes:
      - ./model_cache/llm:/root/.cache/huggingface
    ports:
      - "8001:8000"
    command: >
      --model Qwen/Qwen3-14B-AWQ
      --quantization awq
      --dtype auto
      --gpu-memory-utilization 0.85
      --max-model-len 8192
      --enforce-eager
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - officemate-network

  # ----------------------------------------
  # Service 2: Embeddings (BGE-M3)
  # ----------------------------------------
  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:1.5
    container_name: tei-prod
    restart: always
    runtime: nvidia
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    volumes:
      - ./model_cache/tei:/data
    ports:
      - "8081:80"
    command: >
      --model-id BAAI/bge-m3
      --auto-truncate
      --max-client-batch-size 64
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - officemate-network

  # ----------------------------------------
  # Service 3: Qdrant
  # ----------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: officemate-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY}
    networks:
      - officemate-network
    restart: unless-stopped

  # ----------------------------------------
  # Service 4: PostgreSQL
  # ----------------------------------------
  pgdb:
    image: postgres:16
    container_name: pgsql-prod
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - officemate-network

  # ----------------------------------------
  # Service 5: Backend
  # ----------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: officemate-backend
    ports:
      - "8000:8000"
    environment:
      - VLLM_BASE_URL=${VLLM_BASE_URL}
      - VLLM_API_KEY=${VLLM_API_KEY}
      - VLLM_MODEL_NAME=${VLLM_MODEL_NAME}
      - EMBEDDING_URL=${EMBEDDING_URL}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY}
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - QDRANT_COLLECTION=${QDRANT_COLLECTION}
    depends_on:
      - qdrant
    networks:
      - officemate-network
    restart: unless-stopped

  # ----------------------------------------
  # Service 6: Frontend
  # ----------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: officemate-frontend
    ports:
      - "8080:8080"
    environment:
      - API_BASE_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - officemate-network
    restart: unless-stopped

volumes:
  qdrant_data:
  postgres_data: